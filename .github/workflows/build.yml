name: Build AutoPhoto

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  APP_NAME: AutoPhoto

# ============================================================
# JOB 1: BUILD WINDOWS → tạo file .exe cài đặt (NSIS wizard)
# ============================================================
jobs:
  build-windows:
    runs-on: windows-2022
    name: Build (Windows)

    steps:
      - uses: actions/checkout@v4

      # Cài Qt 6.4 cho Windows (MSVC 64-bit)
      - name: Install Qt 6.4
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          arch: win64_msvc2019_64
          modules: 'qtshadertools'

      # Cài Ninja (build tool nhanh hơn make)
      - name: Install Ninja
        run: choco install ninja -y

      # Cài NSIS để tạo installer .exe có wizard
      - name: Install NSIS
        run: choco install nsis -y

      # Cài vcpkg (package manager để lấy OpenCV trên Windows)
      # - name: Setup vcpkg
      #   uses: lukka/run-vcpkg@v11
      #   with:
      #     vcpkgDirectory: '${{ github.workspace }}/vcpkg_custom'
      - name: Setup vcpkg manually
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg_custom
          cd ${{ github.workspace }}/vcpkg_custom
          .\bootstrap-vcpkg.bat

      # Cài OpenCV qua vcpkg (chỉ lấy các module cần thiết, tránh mất thời gian)
      - name: Install OpenCV via vcpkg
        # run: vcpkg install opencv4[core,dnn,imgproc,photo]:x64-windows
        run: ${{ github.workspace }}\vcpkg_custom\vcpkg.exe install opencv4[dnn]:x64-windows

      # Kích hoạt môi trường Microsoft Visual C++
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # Cấu hình CMake, trỏ tới vcpkg để tìm OpenCV
      # Ninja sẽ tự động dùng 'cl.exe' của Microsoft nhờ vào lệnh kích hoạt môi trường Microsoft Visual C++ ở trên
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg_custom/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # Build project
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # *** BƯỚC QUAN TRỌNG ***
      # windeployqt tự động copy tất cả .dll Qt cần thiết
      # vào cùng thư mục với AutoPhoto.exe
      # → Người dùng sẽ có đủ thư viện để chạy
      - name: Deploy Qt DLLs (windeployqt)
        run: |
          windeployqt build/${{ env.APP_NAME }}.exe --release --no-translations

      # Dùng CPack + NSIS tạo file AutoPhoto-Setup.exe có wizard cài đặt
      # Người dùng chỉ cần double-click → Next → Next → Install
      - name: Package NSIS Installer
        run: |
          cd build
          cpack -G NSIS
          Move-Item *.exe ../${{ env.APP_NAME }}-Windows-Setup.exe

      # Upload file lên GitHub Actions để tải về
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-Windows-Setup
          path: '${{ env.APP_NAME }}-Windows-Setup.exe'
          retention-days: 30

# ============================================================
# JOB 2: BUILD MACOS → tạo file .dmg (kéo thả cài đặt)
# ============================================================
  build-macos:
    runs-on: macos-14
    name: Build (macOS)

    steps:
      - uses: actions/checkout@v4

      # Cài Qt 6.4 cho macOS
      - name: Install Qt 6.4
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          arch: clang_64
          modules: 'qtshadertools'

      # Cài Ninja và OpenCV qua Homebrew
      - name: Install dependencies
        run: brew install ninja opencv

      # Cấu hình CMake
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      # Build project
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # *** BƯỚC QUAN TRỌNG ***
      # macdeployqt bundle toàn bộ Qt frameworks vào trong .app
      # → File .app trở thành self-contained, chạy được trên máy không có Qt
      - name: Deploy Qt frameworks (macdeployqt)
        run: |
          macdeployqt build/${{ env.APP_NAME }}.app -verbose=1

      # Tạo file .dmg (disk image) kiểu "kéo thả"
      # Người dùng mở .dmg → kéo AutoPhoto vào thư mục Applications
      - name: Create DMG
        run: |
          cd build
          cpack -G DragNDrop
          mv *.dmg ../${{ env.APP_NAME }}-macOS.dmg

      # Upload file lên GitHub Actions
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-macOS
          path: '${{ env.APP_NAME }}-macOS.dmg'
          retention-days: 30

# ============================================================
# JOB 3: BUILD LINUX → tạo file .AppImage (chạy được trên mọi distro)
# ============================================================
  build-ubuntu:
    runs-on: ubuntu-22.04
    name: Build (Linux)

    steps:
      - uses: actions/checkout@v4

      # Cài Qt 6.4 cho Linux
      - name: Install Qt 6.4
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          arch: gcc_64
          modules: 'qtshadertools'

      # Cài OpenCV và Ninja
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev ninja-build

      # Cấu hình CMake
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      # Build project
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # *** BƯỚC QUAN TRỌNG ***
      # linuxdeploy + plugin-qt bundle Qt và tạo AppImage
      # AppImage là file duy nhất, chạy được trên Ubuntu/Fedora/Debian...
      # mà không cần cài đặt gì cả (chmod +x rồi double-click)
      - name: Download linuxdeploy tools
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      # Tạo cấu trúc AppDir và build AppImage
      - name: Create AppImage
        env:
          # QMAKE: ${{ env.Qt6_DIR }}/bin/qmake
          QML_SOURCES_PATHS: ${{ github.workspace }}
        run: |
          export QMAKE=$(which qmake)
          # Tạo thư mục AppDir theo chuẩn
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy executable vào AppDir
          # cp build/${{ env.APP_NAME }} AppDir/usr/bin/
          cp build/autophoto AppDir/usr/bin/${{ env.APP_NAME }}

          # Tạo file .desktop (shortcut icon trên Linux)
          cat > AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Graphics;Photography;
          EOF

          # Copy icon (nếu có file icon.png trong project, đổi đường dẫn cho đúng)
          # Nếu chưa có icon, tạo icon trống tạm thời
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          else
            convert -size 256x256 xc:gray AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png 2>/dev/null || \
            cp /usr/share/pixmaps/gnome-dev-media-dvd-video.png AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png 2>/dev/null || true
          fi

          # linuxdeploy bundle Qt vào AppDir rồi xuất ra .AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          # Đổi tên file AppImage cho rõ ràng
          mv ${{ env.APP_NAME }}-x86_64.AppImage ${{ env.APP_NAME }}-Linux.AppImage

      # Upload file lên GitHub Actions
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-Linux
          path: '${{ env.APP_NAME }}-Linux.AppImage'
          retention-days: 30

# ============================================================
# JOB 4: TẠO GITHUB RELEASE (chỉ chạy khi push tag v*)
# Ví dụ: git tag v1.0.0 && git push origin v1.0.0
# → Tự động tạo Release trên GitHub với 3 file đính kèm
# ============================================================
  release:
    name: Create GitHub Release
    # Chỉ chạy job này khi push tag (v1.0, v2.0.1, ...)
    if: startsWith(github.ref, 'refs/tags/v')
    # Phải chờ cả 3 job build xong mới chạy
    needs: [build-windows, build-macos, build-ubuntu]
    runs-on: ubuntu-latest

    steps:
      # Tải về tất cả artifact từ 3 job build ở trên
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoPhoto-Windows-Setup
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoPhoto-macOS
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoPhoto-Linux
          path: release/

      # Tạo GitHub Release và đính kèm 3 file
      # Người dùng vào tab "Releases" trên GitHub để tải về
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AutoPhoto ${{ github.ref_name }}"
          body: |
            ## AutoPhoto ${{ github.ref_name }}

            ### Tải về theo hệ điều hành:
            | Hệ điều hành | File | Hướng dẫn |
            |---|---|---|
            | 🪟 Windows | `AutoPhoto-Windows-Setup.exe` | Double-click → Next → Install |
            | 🍎 macOS | `AutoPhoto-macOS.dmg` | Mở → kéo vào Applications |
            | 🐧 Linux | `AutoPhoto-Linux.AppImage` | `chmod +x` rồi double-click |

          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
          draft: false
          prerelease: false